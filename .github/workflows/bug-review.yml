name: Bug Review Agent

on:
  schedule:
    # Runs every Monday and Thursday at 8:00 AM UTC
    - cron: '0 8 * * 1,4'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20  # Need recent history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run bug review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/bug_review.py --ci --fix
